<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fraction Match</title><style>body{margin:0;min-height:100vh;font-family:system-ui,Segoe UI,sans-serif;color:#172033;background:linear-gradient(135deg,#f7fbff,#edf4ff 50%,#fff6ec);display:grid;place-items:center}.app{width:min(1100px,100%);padding:18px}.shell{display:grid;grid-template-columns:300px 1fr;gap:14px}.panel,.main,.card{background:rgba(255,255,255,.9);border:1px solid rgba(23,32,51,.12);border-radius:22px;box-shadow:0 18px 46px rgba(21,35,61,.14)}.panel{padding:16px;display:grid;gap:12px}.main{padding:18px;display:grid;gap:14px}h1{font-size:2.2rem;margin:.2rem 0}.name,.class-select{min-height:48px;border-radius:14px;border:2px solid #dbe7ff;padding:0 12px;font:inherit;font-weight:800}.btn{min-height:50px;border:0;border-radius:14px;background:linear-gradient(135deg,#2868e8,#1e9fcf);color:white;font-weight:900}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.hud div,.card{padding:12px}.hud span{display:block;color:#657086;font-size:.8rem;font-weight:800}.hud strong{font-size:2rem}.question{min-height:280px;display:grid;place-items:center;gap:14px}.sum{font-size:clamp(4rem,12vw,8rem);font-weight:950}.answers{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:min(760px,100%)}.answers button{min-height:92px;border-radius:18px;border:2px solid #e2e8f0;background:white;font-size:clamp(2rem,5vw,4rem);font-weight:950}.good{color:#17856f}.miss{color:#d5483f}@media(max-width:780px){.shell{grid-template-columns:1fr}}</style></head><body><main class="app"><div class="shell"><aside class="panel"><h1>Fraction Match</h1><input class="name" id="name" placeholder="Type name"><select class="class-select" id="classLevel" aria-label="Class"><option value="1st Class">1st Class</option><option value="2nd Class">2nd Class</option><option value="3rd Class">3rd Class</option><option value="4th Class">4th Class</option><option value="5th Class">5th Class</option><option value="6th Class">6th Class</option></select><button class="btn" id="start">Start 60s game</button><h2>Top 5</h2><ol id="leaders"></ol></aside><section class="main"><div class="hud"><div><span>Player</span><strong id="player">-</strong></div><div><span>Score</span><strong id="score">0</strong></div><div><span>Time</span><strong id="time">60</strong></div><div><span>Streak</span><strong id="streak">0</strong></div></div><div class="card question"><p id="prompt">Match the equivalent value</p><div class="sum" id="q">Ready?</div><div class="answers" id="answers"></div><p id="feedback">Type a name to begin.</p></div></section></div></main><script src="../../results-config.js?v=1"></script><script src="../../results-client.js?v=1"></script><script>const FACTS=[['1/2','0.5','50%'],['1/4','0.25','25%'],['3/4','0.75','75%'],['1/5','0.2','20%'],['2/5','0.4','40%'],['3/5','0.6','60%'],['4/5','0.8','80%'],['1/3','0.333','33 1/3%'],['2/3','0.666','66 2/3%'],['3/10','0.3','30%'],['7/10','0.7','70%'],['1/8','0.125','12 1/2%'],['3/8','0.375','37 1/2%'],['5/8','0.625','62 1/2%'],['7/8','0.875','87 1/2%'],['1/6','0.166','16 2/3%'],['1/20','0.05','5%'],['7/20','0.35','35%'],['19/20','0.95','95%']],T=['fraction','decimal','percentage'],STORE='frac-results';let data=JSON.parse(localStorage.getItem(STORE)||'{"best":{}}'),state={on:false,name:'',classLevel:'1st Class',score:0,streak:0,time:60,ans:'',correct:0,attempts:0},timer;const $=s=>document.querySelector(s);function save(){localStorage.setItem(STORE,JSON.stringify(data))}function leaders(){let rows=Object.entries(data.best).sort((a,b)=>b[1]-a[1]).slice(0,5);$('#leaders').innerHTML=rows.length?rows.map(([n,s])=>`<li>${n}: ${s}</li>`).join(''):'<li>No scores yet</li>'}function start(){let n=$('#name').value.trim();if(!n)return;clearInterval(timer);state={on:true,name:n,classLevel:$('#classLevel').value,score:0,streak:0,time:60,ans:'',correct:0,attempts:0};$('#player').textContent=n;hud();next();timer=setInterval(()=>{state.time--;hud();if(state.time<=0)finish()},1000)}function finish(){clearInterval(timer);state.on=false;$('#q').textContent='Done';$('#answers').innerHTML='';$('#feedback').textContent=`${state.name} scored ${state.score}`;data.best[state.name]=Math.max(data.best[state.name]||0,state.score);save();window.ClassroomResults?.record({game:'Fraction Match',playerName:state.name,classLevel:state.classLevel,score:state.score,correct:state.correct,attempts:state.attempts,bestStreak:state.streak,durationSeconds:60});leaders()}function next(){let f=FACTS[rand(0,FACTS.length-1)],from=rand(0,2),to=[0,1,2].filter(x=>x!==from)[rand(0,1)];state.ans=f[to];$('#prompt').textContent=`Choose the matching ${T[to]}`;$('#q').textContent=f[from];let set=new Set([f[to]]);while(set.size<4)set.add(FACTS[rand(0,FACTS.length-1)][to]);$('#answers').innerHTML=[...set].sort(()=>Math.random()-.5).map(v=>`<button>${v}</button>`).join('')}function choose(v){if(!state.on)return;state.attempts++;if(v===state.ans){state.correct++;state.streak++;state.score+=10+Math.min(20,state.streak*2);$('#feedback').textContent='Correct';$('#feedback').className='good'}else{state.streak=0;$('#feedback').textContent=`Correct: ${state.ans}`;$('#feedback').className='miss'}hud();next()}function hud(){$('#score').textContent=state.score;$('#time').textContent=state.time;$('#streak').textContent=state.streak}function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}$('#start').onclick=start;$('#answers').onclick=e=>{if(e.target.tagName==='BUTTON')choose(e.target.textContent)};leaders();</script></body></html>
