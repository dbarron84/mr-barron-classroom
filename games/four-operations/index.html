<!doctype html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Four Operations Sprint</title>
<style>
*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;font-family:system-ui,Segoe UI,sans-serif;color:#172033;background:linear-gradient(135deg,#f7fbff,#edf4ff 52%,#fff6ec)}button,input{font:inherit}.app{height:100vh;padding:10px;display:grid;place-items:center}.shell{width:min(1280px,100%);height:calc(100vh - 20px);display:grid;grid-template-columns:320px 1fr;gap:10px}.side,.main,.card,.hud div,.stage,.leader,.topics,.top{border:1px solid rgba(23,32,51,.12);border-radius:18px;background:rgba(255,255,255,.9);box-shadow:0 16px 40px rgba(21,35,61,.12)}.side{display:grid;grid-template-rows:auto auto auto 1fr;gap:10px;padding:14px}.brand{display:flex;align-items:center;gap:12px}.badge{width:54px;height:54px;border-radius:15px;background:#ffe066;display:grid;place-items:center;font-weight:950;font-size:1.35rem}.eyebrow{margin:0 0 4px;color:#657086;font-size:.74rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em}h1{margin:0;font-size:2rem;line-height:.95}.card{display:grid;gap:8px;padding:12px}label{font-weight:900}input,.class-select{height:50px;border:2px solid #dbe7ff;border-radius:14px;padding:0 12px;font-weight:850}.primary,.secondary{height:50px;border:0;border-radius:14px;background:linear-gradient(135deg,#2868e8,#1e9fcf);color:#fff;font-weight:950}.secondary{background:linear-gradient(135deg,#25314f,#465a88)}button:disabled,input:disabled{opacity:.55}.topics{display:grid;gap:7px;padding:10px}.topic{min-height:42px;display:flex;justify-content:space-between;align-items:center;border-radius:12px;background:#fff;padding:8px 10px;font-weight:950}.topic.active{background:#eaf1ff;color:#174fc0;outline:2px solid rgba(40,104,232,.25)}.topic.waiting{background:#fff6d8;color:#795600}.leader{padding:10px}.leader h2{margin:0 0 8px}.leader ol{margin:0;padding:0;list-style:none;display:grid;gap:6px}.leader li{display:flex;justify-content:space-between;background:#fff;border-radius:10px;padding:7px 9px;font-weight:900}.main{position:relative;display:grid;grid-template-rows:auto auto 1fr auto;gap:8px;padding:12px;overflow:hidden}.top{display:flex;align-items:center;justify-content:space-between;min-height:68px;padding:10px 14px}.player{display:block;font-size:clamp(1.6rem,3vw,2.5rem)}.hud{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:8px}.hud div{padding:10px 12px}.hud span{display:block;color:#657086;font-size:.76rem;font-weight:900}.hud strong{font-size:clamp(1.4rem,2.6vw,2.35rem);line-height:1}.stage{display:grid;place-items:center;align-content:center;gap:10px;padding:10px;background:linear-gradient(160deg,rgba(255,255,255,.96),rgba(255,255,255,.72))}.q{font-size:clamp(4.2rem,9vw,8rem);line-height:.9;font-weight:950}.answer{min-width:min(420px,80%);min-height:70px;border:3px solid rgba(40,104,232,.22);border-radius:18px;background:#fff;display:grid;place-items:center;color:#174fc0;font-size:clamp(2.2rem,4.4vw,4rem);font-weight:950}.feedback{min-height:24px;margin:0;color:#657086;font-weight:900}.good{color:#17856f}.miss{color:#d5483f}.keys{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.keys button{min-height:66px;border:1px solid rgba(23,32,51,.12);border-radius:17px;background:#fff;font-size:clamp(1.7rem,3vw,2.7rem);font-weight:950}.keys .small{background:#fff1e8;color:#9b3a29;font-size:1.05rem}.keys .enter{grid-row:span 2;background:linear-gradient(135deg,#2bb3a3,#1e9fcf);color:#fff;font-size:1.3rem}.keys .zero{grid-column:span 3}.summary{position:absolute;inset:50% auto auto 50%;transform:translate(-50%,-50%);width:min(520px,calc(100% - 48px));display:grid;gap:14px;text-align:center;padding:22px;border-radius:20px;background:#fff;box-shadow:0 24px 70px rgba(21,35,61,.2);z-index:5}.summary[hidden]{display:none}@media(max-width:900px){.app{padding:6px}.shell{height:calc(100vh - 12px);grid-template-columns:1fr;grid-template-rows:auto 1fr}.side{grid-template-rows:auto auto auto;gap:6px;padding:8px}.badge{width:38px;height:38px}h1{font-size:1.35rem}.card{grid-template-columns:1fr 120px;padding:7px}.card label{position:absolute;width:1px;height:1px;overflow:hidden}.topics{grid-template-columns:repeat(4,1fr);padding:6px}.topic{font-size:.72rem;min-height:32px}.leader{display:none}.main{padding:8px;gap:6px}.top{min-height:48px}.secondary{height:38px;font-size:.82rem}.hud{gap:5px}.hud div{padding:6px}.hud strong{font-size:1.15rem}.q{font-size:clamp(2.9rem,12vw,4.7rem)}.answer{min-height:46px}.keys{gap:5px}.keys button{min-height:44px;border-radius:13px}.keys .small,.keys .enter{font-size:.82rem}}
</style>
</head>
<body>
<main class='app'><section class='shell'><aside class='side'><div class='brand'><div class='badge'>+-</div><div><p class='eyebrow'>Whiteboard maths</p><h1>Four Operations Sprint</h1></div></div><section class='card'><label for='nameInput'>Child name</label><input id='nameInput' autocomplete='off' placeholder='Type name here'><select class='class-select' id='classLevel' aria-label='Class'><option value='1st Class'>1st Class</option><option value='2nd Class'>2nd Class</option><option value='3rd Class'>3rd Class</option><option value='4th Class'>4th Class</option><option value='5th Class'>5th Class</option><option value='6th Class'>6th Class</option></select><button class='primary' id='beginButton'>Begin test</button></section><section class='topics'><div class='topic active' data-topic='addition'><span>Addition</span><strong id='additionScore'>0</strong></div><div class='topic' data-topic='subtraction'><span>Subtraction</span><strong id='subtractionScore'>0</strong></div><div class='topic' data-topic='multiplication'><span>Multiply</span><strong id='multiplicationScore'>0</strong></div><div class='topic' data-topic='division'><span>Divide</span><strong id='divisionScore'>0</strong></div></section><section class='leader'><h2>Top 5</h2><ol id='leaderboardList'></ol></section></aside><section class='main'><div class='top'><div><p class='eyebrow'>Current test</p><strong class='player' id='currentPlayer'>Enter a name</strong></div><button class='secondary' id='cancelButton' disabled>Cancel test</button></div><div class='hud'><div><span>Topic</span><strong id='topicValue'>Ready</strong></div><div><span>Score</span><strong id='scoreValue'>0</strong></div><div><span>Time</span><strong id='timeValue'>60</strong></div><div><span>Total</span><strong id='totalValue'>0</strong></div></div><div class='stage'><p class='eyebrow' id='promptLabel'>Answer as many as you can</p><div class='q' id='questionText'>Ready?</div><div class='answer' id='answerDisplay'>0</div><p class='feedback' id='feedbackText'>Type a name, then begin.</p></div><div class='keys' id='keypad'><button data-key='7'>7</button><button data-key='8'>8</button><button data-key='9'>9</button><button class='small' data-key='back'>Back</button><button data-key='4'>4</button><button data-key='5'>5</button><button data-key='6'>6</button><button class='small' data-key='clear'>Clear</button><button data-key='1'>1</button><button data-key='2'>2</button><button data-key='3'>3</button><button class='enter' data-key='enter'>Enter</button><button class='zero' data-key='0'>0</button></div><div class='summary' id='summaryPanel' hidden><h2>Test complete</h2><p id='summaryText'></p><button class='primary' id='againButton'>New test</button></div></section></section></main>
<script src='../../results-config.js?v=1'></script><script src='../../results-client.js?v=1'></script>
<script>
const STORE='four-operations-sprint-results',TOPIC_SECONDS=60,TOPICS=[{id:'addition',label:'Addition'},{id:'subtraction',label:'Subtraction'},{id:'multiplication',label:'Multiply'},{id:'division',label:'Divide'}];
const QUESTIONS={addition:[[2,'+',3,5],[4,'+',5,9],[6,'+',2,8],[7,'+',4,11],[8,'+',5,13],[10,'+',4,14],[12,'+',3,15],[14,'+',5,19],[16,'+',2,18],[18,'+',6,24],[20,'+',7,27],[23,'+',5,28],[25,'+',8,33],[31,'+',6,37],[34,'+',10,44],[36,'+',12,48],[41,'+',13,54],[45,'+',14,59],[48,'+',17,65],[52,'+',18,70],[56,'+',23,79],[61,'+',24,85],[67,'+',28,95],[73,'+',19,92],[78,'+',21,99]],subtraction:[[7,'-',2,5],[9,'-',4,5],[10,'-',3,7],[12,'-',5,7],[15,'-',4,11],[18,'-',6,12],[20,'-',5,15],[22,'-',7,15],[25,'-',10,15],[28,'-',6,22],[30,'-',8,22],[34,'-',12,22],[38,'-',15,23],[42,'-',20,22],[45,'-',13,32],[50,'-',16,34],[53,'-',18,35],[60,'-',25,35],[64,'-',28,36],[70,'-',31,39],[75,'-',27,48],[82,'-',34,48],[90,'-',45,45],[96,'-',38,58],[99,'-',47,52]],multiplication:[[2,'x',3,6],[4,'x',2,8],[5,'x',5,25],[3,'x',6,18],[7,'x',2,14],[4,'x',8,32],[6,'x',6,36],[9,'x',3,27],[7,'x',5,35],[8,'x',4,32],[6,'x',9,54],[7,'x',8,56],[9,'x',7,63],[8,'x',8,64],[11,'x',6,66],[12,'x',5,60],[9,'x',9,81],[12,'x',7,84],[11,'x',8,88],[12,'x',8,96],[11,'x',11,121],[12,'x',9,108],[12,'x',11,132],[10,'x',12,120],[12,'x',12,144]],division:[[6,'÷',2,3],[12,'÷',3,4],[15,'÷',5,3],[18,'÷',6,3],[20,'÷',4,5],[28,'÷',7,4],[32,'÷',8,4],[36,'÷',6,6],[42,'÷',7,6],[45,'÷',9,5],[48,'÷',8,6],[54,'÷',9,6],[56,'÷',7,8],[63,'÷',9,7],[64,'÷',8,8],[72,'÷',8,9],[81,'÷',9,9],[84,'÷',7,12],[88,'÷',11,8],[96,'÷',12,8],[99,'÷',9,11],[108,'÷',12,9],[121,'÷',11,11],[132,'÷',12,11],[144,'÷',12,12]]};
const $=s=>document.querySelector(s),nameInput=$('#nameInput'),classSelect=$('#classLevel'),beginButton=$('#beginButton'),cancelButton=$('#cancelButton'),againButton=$('#againButton'),currentPlayer=$('#currentPlayer'),topicValue=$('#topicValue'),scoreValue=$('#scoreValue'),timeValue=$('#timeValue'),totalValue=$('#totalValue'),questionText=$('#questionText'),answerDisplay=$('#answerDisplay'),feedbackText=$('#feedbackText'),promptLabel=$('#promptLabel'),keypad=$('#keypad'),summaryPanel=$('#summaryPanel'),summaryText=$('#summaryText'),leaderboardList=$('#leaderboardList'),topicRows=[...document.querySelectorAll('.topic')],scoreEls={addition:$('#additionScore'),subtraction:$('#subtractionScore'),multiplication:$('#multiplicationScore'),division:$('#divisionScore')};
let timerId=null,activeQuestion=null,answer='',results=loadResults(),state=fresh();
function fresh(){return{playing:false,waiting:false,playerName:'',classLevel:'1st Class',topicIndex:0,questionIndex:0,timeLeft:TOPIC_SECONDS,currentScore:0,totalScore:0,streak:0,topicScores:{addition:0,subtraction:0,multiplication:0,division:0},topicCorrect:{addition:0,subtraction:0,multiplication:0,division:0},topicAttempts:{addition:0,subtraction:0,multiplication:0,division:0}}}
function begin(){const name=nameInput.value.trim().replace(/\s+/g,' ');if(!name){feedback('Type a name first.','miss');return nameInput.focus()}clearInterval(timerId);state=fresh();state.playerName=name;state.classLevel=classSelect.value;summaryPanel.hidden=true;beginButton.disabled=true;nameInput.disabled=true;cancelButton.disabled=false;currentPlayer.textContent=name;startTopic(0)}
function startTopic(i){state.topicIndex=i;state.questionIndex=0;state.timeLeft=TOPIC_SECONDS;state.currentScore=state.topicScores[topic().id];state.playing=true;state.waiting=false;answer='';activeQuestion=null;summaryPanel.hidden=true;hud();next();clearInterval(timerId);timerId=setInterval(tick,1000)}
function tick(){state.timeLeft--;hud();if(state.timeLeft<=0)advance()}
function advance(){clearInterval(timerId);const nextIndex=state.topicIndex+1;if(nextIndex>=TOPICS.length)return finish();state.playing=false;state.waiting=true;activeQuestion=null;answer='';questionText.textContent='Round done';answerDisplay.textContent='0';promptLabel.textContent=topic().label+' complete';feedback('Ready for '+TOPICS[nextIndex].label+'?','good');summaryText.textContent=topic().label+' score: '+state.topicScores[topic().id]+'. Press the button when the class is ready.';againButton.textContent='Start '+TOPICS[nextIndex].label;summaryPanel.hidden=false;hud()}
function finish(){clearInterval(timerId);state.playing=false;state.waiting=false;cancelButton.disabled=true;beginButton.disabled=false;nameInput.disabled=false;activeQuestion=null;answer='';questionText.textContent='Done';answerDisplay.textContent='0';promptLabel.textContent='Test complete';record();leaders();hud();summaryText.textContent=`${state.playerName} scored ${state.totalScore}. Addition ${state.topicScores.addition}, subtraction ${state.topicScores.subtraction}, multiply ${state.topicScores.multiplication}, divide ${state.topicScores.division}.`;againButton.textContent='New test';summaryPanel.hidden=false}
function cancel(){clearInterval(timerId);state=fresh();activeQuestion=null;answer='';nameInput.disabled=false;beginButton.disabled=false;cancelButton.disabled=true;currentPlayer.textContent='Enter a name';questionText.textContent='Ready?';answerDisplay.textContent='0';promptLabel.textContent='Answer as many as you can';summaryPanel.hidden=true;feedback('Test cancelled. No score recorded.','');hud()}
function again(){if(state.waiting)return startTopic(state.topicIndex+1);summaryPanel.hidden=true;nameInput.value='';nameInput.focus();cancel();feedback('Type a name, then begin.','')}
function next(){const t=topic().id,q=QUESTIONS[t][state.questionIndex];if(!q)return advance();activeQuestion={text:`${q[0]} ${q[1]} ${q[2]}`,answer:q[3]};answer='';questionText.textContent=activeQuestion.text;answerDisplay.textContent='0';promptLabel.textContent=`${topic().label} ${state.questionIndex+1} of 25`}
function key(k){if(!state.playing||!activeQuestion||state.waiting)return;if(/^\d$/.test(k)){if(answer.length<5){answer=answer==='0'?k:answer+k;answerDisplay.textContent=answer||'0'}return}if(k==='back'){answer=answer.slice(0,-1);answerDisplay.textContent=answer||'0';return}if(k==='clear'){answer='';answerDisplay.textContent='0';return}if(k==='enter')submit()}
function submit(){if(!answer)return feedback('Enter an answer first.','miss');const t=topic().id,guess=parseInt(answer,10);state.topicAttempts[t]++;if(guess===activeQuestion.answer){state.topicCorrect[t]++;state.streak++;const points=10+Math.min(20,state.streak*2);state.topicScores[t]+=points;state.totalScore+=points;state.currentScore=state.topicScores[t];feedback('Correct.','good')}else{state.streak=0;feedback(`${activeQuestion.text} = ${activeQuestion.answer}`,'miss')}state.questionIndex++;hud();next()}
function record(){const row={name:state.playerName,date:new Date().toISOString(),totalScore:state.totalScore,topicScores:{...state.topicScores},topicCorrect:{...state.topicCorrect},topicAttempts:{...state.topicAttempts}};results.attempts.push(row);const prev=results.bestByName[state.playerName]||{totalScore:0};if(row.totalScore>=prev.totalScore)results.bestByName[state.playerName]=row;saveResults();window.ClassroomResults?.record({game:'Four Operations Sprint',playerName:state.playerName,classLevel:state.classLevel,score:state.totalScore,correct:Object.values(state.topicCorrect).reduce((a,b)=>a+b,0),attempts:Object.values(state.topicAttempts).reduce((a,b)=>a+b,0),additionScore:state.topicScores.addition,subtractionScore:state.topicScores.subtraction,multiplicationScore:state.topicScores.multiplication,divisionScore:state.topicScores.division,additionCorrect:state.topicCorrect.addition,subtractionCorrect:state.topicCorrect.subtraction,multiplicationCorrect:state.topicCorrect.multiplication,divisionCorrect:state.topicCorrect.division,durationSeconds:TOPIC_SECONDS*TOPICS.length})}
function leaders(){const top=Object.values(results.bestByName).sort((a,b)=>b.totalScore-a.totalScore||a.name.localeCompare(b.name)).slice(0,5);leaderboardList.innerHTML=top.length?top.map((l,i)=>`<li><span>${i+1}. ${esc(l.name)}</span><strong>${l.totalScore}</strong></li>`).join(''):'<li><span>No scores yet</span><strong>0</strong></li>'}
function hud(){const t=topic();topicValue.textContent=state.playing||state.waiting?t.label:'Ready';scoreValue.textContent=state.currentScore;timeValue.textContent=state.timeLeft;totalValue.textContent=state.totalScore;topicRows.forEach(r=>{r.classList.toggle('active',r.dataset.topic===t.id&&state.playing);r.classList.toggle('waiting',r.dataset.topic===t.id&&state.waiting)});Object.entries(scoreEls).forEach(([k,el])=>el.textContent=state.topicScores[k])}
function topic(){return TOPICS[state.topicIndex]||TOPICS[0]}function feedback(m,t){feedbackText.textContent=m;feedbackText.className=t?'feedback '+t:'feedback'}function loadResults(){try{const s=JSON.parse(localStorage.getItem(STORE));if(s&&s.attempts&&s.bestByName)return s}catch{}return{attempts:[],bestByName:{}}}function saveResults(){localStorage.setItem(STORE,JSON.stringify(results))}function esc(v){return v.replace(/[&<>']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;'}[c]))}
beginButton.onclick=begin;cancelButton.onclick=cancel;againButton.onclick=again;keypad.onclick=e=>{if(e.target.dataset.key)key(e.target.dataset.key)};nameInput.onkeydown=e=>{if(e.key==='Enter')begin()};window.onkeydown=e=>{if(!state.playing)return;if(/^\d$/.test(e.key))key(e.key);if(e.key==='Backspace')key('back');if(e.key==='Enter')key('enter')};leaders();hud();
</script>
</body>
</html>
