<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Four Operations Sprint</title><style>

</style></head><body><main class="app"><section class="shell"><aside class="side"><div class="brand"><div class="badge">+-</div><div><p class="eyebrow">Whiteboard maths</p><h1>Four Operations Sprint</h1></div></div><section class="card"><label for="nameInput">Child name</label><input id="nameInput" autocomplete="off" placeholder="Type name here"><button class="primary" id="beginButton" type="button">Begin test</button></section><section class="topics"><div class="topic active" data-topic="addition"><span>Addition</span><strong id="additionScore">0</strong></div><div class="topic" data-topic="subtraction"><span>Subtraction</span><strong id="subtractionScore">0</strong></div><div class="topic" data-topic="multiplication"><span>Multiply</span><strong id="multiplicationScore">0</strong></div><div class="topic" data-topic="division"><span>Divide</span><strong id="divisionScore">0</strong></div></section><section class="leader"><h2>Top 5</h2><ol id="leaderboardList"></ol></section></aside><section class="main"><div class="top"><div><p class="eyebrow">Current test</p><strong class="player" id="currentPlayer">Enter a name</strong></div><button class="secondary" id="cancelButton" type="button" disabled>Cancel test</button></div><div class="hud"><div><span>Topic</span><strong id="topicValue">Ready</strong></div><div><span>Score</span><strong id="scoreValue">0</strong></div><div><span>Time</span><strong id="timeValue">60</strong></div><div><span>Total</span><strong id="totalValue">0</strong></div></div><div class="stage"><p class="eyebrow" id="promptLabel">Answer as many as you can</p><div class="q" id="questionText">Ready?</div><div class="answer" id="answerDisplay">0</div><p class="feedback" id="feedbackText">Type a name, then begin.</p></div><div class="keys" id="keypad"><button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button><button class="small" data-key="back">Back</button><button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button><button class="small" data-key="clear">Clear</button><button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button><button class="enter" data-key="enter">Enter</button><button class="zero" data-key="0">0</button></div><div class="summary" id="summaryPanel" hidden><h2>Test complete</h2><p id="summaryText"></p><button class="primary" id="againButton" type="button">New test</button></div></section></section></main><script>

const $=s=>document.querySelector(s),nameInput=$("#nameInput"),beginButton=$("#beginButton"),cancelButton=$("#cancelButton"),againButton=$("#againButton"),currentPlayer=$("#currentPlayer"),topicValue=$("#topicValue"),scoreValue=$("#scoreValue"),timeValue=$("#timeValue"),totalValue=$("#totalValue"),questionText=$("#questionText"),answerDisplay=$("#answerDisplay"),feedbackText=$("#feedbackText"),promptLabel=$("#promptLabel"),keypad=$("#keypad"),summaryPanel=$("#summaryPanel"),summaryText=$("#summaryText"),leaderboardList=$("#leaderboardList"),topicRows=[...document.querySelectorAll(".topic")],scoreEls={addition:$("#additionScore"),subtraction:$("#subtractionScore"),multiplication:$("#multiplicationScore"),division:$("#divisionScore")};let timerId=null,activeQuestion=null,answer="",results=loadResults(),state=freshState();function freshState(){return{playing:false,waitingForNextTopic:false,playerName:"",topicIndex:0,questionIndex:0,timeLeft:TOPIC_SECONDS,currentScore:0,totalScore:0,streak:0,topicScores:{addition:0,subtraction:0,multiplication:0,division:0},topicCorrect:{addition:0,subtraction:0,multiplication:0,division:0},topicAttempts:{addition:0,subtraction:0,multiplication:0,division:0}}}function beginTest(){const name=nameInput.value.trim().replace(/\s+/g," ");if(!name){feedback("Type a name first.","miss");return nameInput.focus()}clearInterval(timerId);state=freshState();state.playerName=name;summaryPanel.hidden=true;beginButton.disabled=true;nameInput.disabled=true;cancelButton.disabled=false;currentPlayer.textContent=name;startTopic(0)}function startTopic(i){state.topicIndex=i;state.questionIndex=0;state.timeLeft=TOPIC_SECONDS;state.currentScore=state.topicScores[currentTopic().id];state.playing=true;state.waitingForNextTopic=false;answer="";activeQuestion=null;summaryPanel.hidden=true;updateHud();nextQuestion();clearInterval(timerId);timerId=setInterval(tick,1e3)}function tick(){state.timeLeft--;updateHud();if(state.timeLeft<=0)advanceTopic()}function advanceTopic(){clearInterval(timerId);const next=state.topicIndex+1;if(next>=TOPICS.length)return finishTest();showRoundBreak(next)}function showRoundBreak(next){state.playing=false;state.waitingForNextTopic=true;activeQuestion=null;answer="";questionText.textContent="Round done";answerDisplay.textContent="0";promptLabel.textContent=`${currentTopic().label} complete`;feedback(`Ready for ${TOPICS[next].label}?`,"good");summaryText.textContent=`${currentTopic().label} score: ${state.topicScores[currentTopic().id]}. Press the button when the class is ready for ${TOPICS[next].label}.`;againButton.textContent=`Start ${TOPICS[next].label}`;summaryPanel.hidden=false;updateHud()}function finishTest(){clearInterval(timerId);state.playing=false;state.waitingForNextTopic=false;cancelButton.disabled=true;beginButton.disabled=false;nameInput.disabled=false;activeQuestion=null;answer="";questionText.textContent="Done";answerDisplay.textContent="0";promptLabel.textContent="Test complete";recordResult();renderLeaderboard();updateHud();summaryText.textContent=`${state.playerName} scored ${state.totalScore}. Addition ${state.topicScores.addition}, subtraction ${state.topicScores.subtraction}, multiply ${state.topicScores.multiplication}, divide ${state.topicScores.division}.`;againButton.textContent="New test";summaryPanel.hidden=false}function cancelTest(){clearInterval(timerId);state=freshState();activeQuestion=null;answer="";nameInput.disabled=false;beginButton.disabled=false;cancelButton.disabled=true;currentPlayer.textContent="Enter a name";questionText.textContent="Ready?";answerDisplay.textContent="0";promptLabel.textContent="Answer as many as you can";summaryPanel.hidden=true;feedback("Test cancelled. No score recorded.","");updateHud()}function newTest(){if(state.waitingForNextTopic)return startTopic(state.topicIndex+1);summaryPanel.hidden=true;nameInput.value="";nameInput.focus();cancelTest();feedback("Type a name, then begin.","")}function nextQuestion(){const topic=currentTopic().id,q=QUESTIONS[topic][state.questionIndex];if(!q)return advanceTopic();activeQuestion={text:`${q[0]} ${q[1]} ${q[2]}`,answer:q[3]};answer="";questionText.textContent=activeQuestion.text;answerDisplay.textContent="0";promptLabel.textContent=`${currentTopic().label} ${state.questionIndex+1} of 25`}function handleKey(key){if(!state.playing||!activeQuestion||state.waitingForNextTopic)return;if(/^\d$/.test(key)){if(answer.length<5){answer=answer==="0"?key:answer+key;answerDisplay.textContent=answer||"0"}return}if(key==="back"){answer=answer.slice(0,-1);answerDisplay.textContent=answer||"0";return}if(key==="clear"){answer="";answerDisplay.textContent="0";return}if(key==="enter")submitAnswer()}function submitAnswer(){if(!answer)return feedback("Enter an answer first.","miss");const topic=currentTopic().id,guess=parseInt(answer,10);state.topicAttempts[topic]++;if(guess===activeQuestion.answer){state.topicCorrect[topic]++;state.streak++;const points=10+Math.min(20,state.streak*2);state.topicScores[topic]+=points;state.totalScore+=points;state.currentScore=state.topicScores[topic];feedback("Correct.","good")}else{state.streak=0;feedback(`${activeQuestion.text} = ${activeQuestion.answer}`,"miss")}state.questionIndex++;updateHud();nextQuestion()}function recordResult(){const row={name:state.playerName,date:new Date().toISOString(),totalScore:state.totalScore,topicScores:{...state.topicScores},topicCorrect:{...state.topicCorrect},topicAttempts:{...state.topicAttempts}};results.attempts.push(row);const prev=results.bestByName[state.playerName]||{totalScore:0};if(row.totalScore>=prev.totalScore)results.bestByName[state.playerName]=row;saveResults()}function renderLeaderboard(){const leaders=Object.values(results.bestByName).sort((a,b)=>b.totalScore-a.totalScore||a.name.localeCompare(b.name)).slice(0,5);leaderboardList.innerHTML="";if(!leaders.length){leaderboardList.innerHTML="<li><span>No scores yet</span><strong>0</strong></li>";return}leaders.forEach((l,i)=>{const item=document.createElement("li");item.innerHTML=`<span><b>${i+1}</b>${escapeHtml(l.name)}</span><strong>${l.totalScore}</strong>`;leaderboardList.append(item)})}function updateHud(){const topic=currentTopic();topicValue.textContent=state.playing||state.waitingForNextTopic?topic.label:"Ready";scoreValue.textContent=state.currentScore;timeValue.textContent=state.timeLeft;totalValue.textContent=state.totalScore;topicRows.forEach(r=>{r.classList.toggle("active",r.dataset.topic===topic.id&&state.playing);r.classList.toggle("waiting",r.dataset.topic===topic.id&&state.waitingForNextTopic)});Object.entries(scoreEls).forEach(([t,el])=>el.textContent=state.topicScores[t])}function currentTopic(){return TOPICS[state.topicIndex]||TOPICS[0]}function feedback(m,t){feedbackText.textContent=m;feedbackText.className=t?`feedback ${t}`:"feedback"}function loadResults(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY));if(s&&s.attempts&&s.bestByName)return s}catch{}return{attempts:[],bestByName:{}}}function saveResults(){localStorage.setItem(STORAGE_KEY,JSON.stringify(results))}function escapeHtml(v){return v.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}beginButton.onclick=beginTest;cancelButton.onclick=cancelTest;againButton.onclick=newTest;keypad.onclick=e=>{if(e.target.dataset.key)handleKey(e.target.dataset.key)};nameInput.onkeydown=e=>{if(e.key==="Enter")beginTest()};window.onkeydown=e=>{if(!state.playing)return;if(/^\d$/.test(e.key))handleKey(e.key);if(e.key==="Backspace")handleKey("back");if(e.key==="Enter")handleKey("enter")};renderLeaderboard();updateHud();
