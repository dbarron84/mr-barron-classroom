<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Spelling Sound Check</title><style>body{margin:0;height:100vh;overflow:hidden;font-family:system-ui,Segoe UI,sans-serif;color:#172033;background:linear-gradient(135deg,#f7fbff,#edf4ff 50%,#fff6ec);display:grid;place-items:center}.app{width:min(1100px,100%);height:100vh;padding:10px;display:grid;place-items:center}.shell{width:100%;height:calc(100vh - 20px);display:grid;grid-template-columns:280px 1fr;gap:10px;min-height:0}.panel,.main,.card{background:rgba(255,255,255,.9);border:1px solid rgba(23,32,51,.12);border-radius:22px;box-shadow:0 18px 46px rgba(21,35,61,.14)}.panel{padding:10px;display:grid;gap:8px;align-content:start;min-height:0;overflow:hidden}.main{padding:10px;display:grid;gap:8px;min-height:0;overflow:hidden}h1{font-size:1.65rem;margin:.1rem 0;line-height:1}.name,.class-select{min-height:42px;border-radius:14px;border:2px solid #dbe7ff;padding:0 12px;font:inherit;font-weight:800}.btn,.listen{min-height:42px;border:0;border-radius:14px;background:linear-gradient(135deg,#2868e8,#1e9fcf);color:white;font-weight:900}.listen{min-height:58px;font-size:1.55rem;background:linear-gradient(135deg,#2bb3a3,#1e9fcf)}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.hud div,.card{padding:8px}.hud span{display:block;color:#657086;font-size:.8rem;font-weight:800}.hud strong{font-size:1.55rem}.question{min-height:0;display:grid;place-items:center;gap:14px}.answers{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:min(820px,100%)}.answers button{min-height:78px;border-radius:18px;border:2px solid #e2e8f0;background:white;font-size:clamp(1.4rem,3.5vw,3.4rem);font-weight:950;white-space:nowrap;overflow:hidden}.good{color:#17856f}.miss{color:#d5483f}@media(max-width:780px){body{overflow:auto}.app{height:auto;min-height:100vh}.shell{height:auto;grid-template-columns:1fr}.answers{grid-template-columns:1fr}}</style></head><body><main class="app"><div class="shell"><aside class="panel"><h1>Spelling Sound Check</h1><input class="name" id="name" placeholder="Type name"><select class="class-select" id="classLevel" aria-label="Class"><option value="1st Class">1st Class</option><option value="2nd Class">2nd Class</option><option value="3rd Class">3rd Class</option><option value="4th Class">4th Class</option><option value="5th Class">5th Class</option><option value="6th Class">6th Class</option></select><button class="btn" id="start">Start 60s game</button><h2>Top 5</h2><ol id="leaders"></ol></aside><section class="main"><div class="hud"><div><span>Player</span><strong id="player">-</strong></div><div><span>Score</span><strong id="score">0</strong></div><div><span>Time</span><strong id="time">60</strong></div><div><span>Streak</span><strong id="streak">0</strong></div></div><div class="card question"><p>Listen, then choose</p><button class="listen" id="listen" disabled>Read word</button><div class="answers" id="answers"></div><p id="feedback">Type a name to begin.</p></div></section></div></main><script src="../../results-config.js?v=1"></script><script src="../../results-client.js?v=1"></script><script>const WORDS='visitor fountain widow razor curtains customer hospital district justice diamond concerned mystery responsibility anxious recognize majority cautious territory necessary apologised excursion exhibition museum society displays illustrations description marvellous recommended disappointed election government country parties appeal advertisements usually speeches announcing secure candle leather whistle badger wooden national announcer earaches genuine stomach foreign certificate assembled ancient signature curiosity despised interval cathedral opportunity'.split(' '),BAD={visitor:'visiter',fountain:'fountian',widow:'widowe',razor:'rasor',curtains:'curtins',customer:'custumer',hospital:'hospitle',district:'districk',justice:'justis',diamond:'dimond',concerned:'concernned',mystery:'mistery',responsibility:'responsability',anxious:'anxous',recognize:'recognise',majority:'majoraty',cautious:'cautios',territory:'teritory',necessary:'neccessary',apologised:'appologised',excursion:'excurtion',exhibition:'exibition',museum:'muesum',society:'socitey',displays:'displayss',illustrations:'ilustrations',description:'discription',marvellous:'marvelous',recommended:'recomended',disappointed:'dissapointed',election:'ellecton',government:'goverment',country:'countrey',parties:'partys',appeal:'apeal',advertisements:'advertisments',usually:'usally',speeches:'speachess',announcing:'anouncing',secure:'secuire',candle:'candul',leather:'lether',whistle:'whissle',badger:'badjer',wooden:'woodan',national:'nashional',announcer:'anouncer',earaches:'earakes',genuine:'genuin',stomach:'stomack',foreign:'foriegn',certificate:'certifikate',assembled:'assembeld',ancient:'anshent',signature:'signiture',curiosity:'curiousity',despised:'despized',interval:'intervil',cathedral:'cathederal',opportunity:'oppurtunity'},STORE='spell-results';let data=JSON.parse(localStorage.getItem(STORE)||'{"best":{}}'),state={on:false,name:'',classLevel:'1st Class',score:0,streak:0,time:60,word:'',correct:0,attempts:0},timer,voice;const $=s=>document.querySelector(s);function voices(){let v=speechSynthesis?.getVoices?.()||[];voice=v.find(x=>x.lang.toLowerCase()==='en-ie')||v.find(x=>/irish|ireland/i.test(x.name+x.lang))||v.find(x=>x.lang.startsWith('en'))}if('speechSynthesis'in window){voices();speechSynthesis.onvoiceschanged=voices}function speak(){if(!state.word||!('speechSynthesis'in window))return;speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(state.word);u.voice=voice;u.lang=voice?.lang||'en-IE';u.rate=.82;speechSynthesis.speak(u)}function save(){localStorage.setItem(STORE,JSON.stringify(data))}function leaders(){let rows=Object.entries(data.best).sort((a,b)=>b[1]-a[1]).slice(0,5);$('#leaders').innerHTML=rows.length?rows.map(([n,s])=>`<li>${n}: ${s}</li>`).join(''):'<li>No scores yet</li>'}function start(){let n=$('#name').value.trim();if(!n)return;clearInterval(timer);state={on:true,name:n,classLevel:$('#classLevel').value,score:0,streak:0,time:60,word:'',correct:0,attempts:0};$('#player').textContent=n;$('#listen').disabled=false;hud();next();timer=setInterval(()=>{state.time--;hud();if(state.time<=0)finish()},1000)}function finish(){clearInterval(timer);state.on=false;$('#answers').innerHTML='';$('#listen').disabled=true;$('#feedback').textContent=`${state.name} scored ${state.score}`;data.best[state.name]=Math.max(data.best[state.name]||0,state.score);save();window.ClassroomResults?.record({game:'Spelling Sound Check',playerName:state.name,classLevel:state.classLevel,score:state.score,correct:state.correct,attempts:state.attempts,bestStreak:state.streak,durationSeconds:60});leaders()}function next(){state.word=WORDS[rand(0,WORDS.length-1)];let choices=[state.word,BAD[state.word]||state.word+'e'].sort(()=>Math.random()-.5);$('#answers').innerHTML=choices.map(v=>`<button>${v}</button>`).join('');$('#feedback').textContent='Listen carefully.';speak()}function choose(v){if(!state.on)return;state.attempts++;if(v===state.word){state.correct++;state.streak++;state.score+=10+Math.min(20,state.streak*2);$('#feedback').textContent='Correct';$('#feedback').className='good'}else{state.streak=0;$('#feedback').textContent=`Correct spelling: ${state.word}`;$('#feedback').className='miss'}hud();setTimeout(()=>state.on&&next(),450)}function hud(){$('#score').textContent=state.score;$('#time').textContent=state.time;$('#streak').textContent=state.streak}function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}$('#start').onclick=start;$('#listen').onclick=speak;$('#answers').onclick=e=>{if(e.target.tagName==='BUTTON')choose(e.target.textContent)};leaders();</script></body></html>
