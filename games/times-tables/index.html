<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Times Tables</title><style>body{margin:0;height:100vh;overflow:hidden;font-family:system-ui,Segoe UI,sans-serif;color:#172033;background:linear-gradient(135deg,#f7fbff,#edf4ff 50%,#fff6ec);display:grid;place-items:center}.app{width:min(1100px,100%);height:100vh;padding:10px;display:grid;place-items:center}.shell{width:100%;height:calc(100vh - 20px);display:grid;grid-template-columns:280px 1fr;gap:10px;min-height:0}.panel,.main,.card{background:rgba(255,255,255,.9);border:1px solid rgba(23,32,51,.12);border-radius:22px;box-shadow:0 18px 46px rgba(21,35,61,.14)}.panel{padding:10px;display:grid;gap:8px;align-content:start;min-height:0;overflow:hidden}.main{padding:10px;display:grid;gap:8px;min-height:0;overflow:hidden}h1{font-size:1.75rem;margin:.1rem 0;line-height:1}.name,.class-select{min-height:42px;border-radius:14px;border:2px solid #dbe7ff;padding:0 12px;font:inherit;font-weight:800}.btn{min-height:42px;border:0;border-radius:14px;background:linear-gradient(135deg,#2868e8,#1e9fcf);color:white;font-weight:900;font-size:1rem}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.hud div,.card{padding:8px}.hud span{display:block;color:#657086;font-size:.8rem;font-weight:800}.hud strong{font-size:1.55rem}.question{min-height:0;display:grid;place-items:center;gap:14px}.sum{font-size:clamp(3rem,9vw,6rem);font-weight:950}.answers{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:min(720px,100%)}.answers button{min-height:72px;border-radius:18px;border:2px solid #e2e8f0;background:white;font-size:3rem;font-weight:950}.good{color:#17856f}.miss{color:#d5483f}.leader ol{padding-left:20px;margin:.2rem 0;max-height:150px;overflow:hidden}.leader h2{margin:.2rem 0;font-size:1.1rem}@media(max-width:780px){body{overflow:auto}.app{height:auto;min-height:100vh}.shell{height:auto;grid-template-columns:1fr}.answers button{font-size:2.2rem}}</style></head><body><main class="app"><div class="shell"><aside class="panel"><h1>Times Tables</h1><input class="name" id="name" placeholder="Type name"><select class="class-select" id="classLevel" aria-label="Class"><option value="1st Class">1st Class</option><option value="2nd Class">2nd Class</option><option value="3rd Class">3rd Class</option><option value="4th Class">4th Class</option><option value="5th Class">5th Class</option><option value="6th Class">6th Class</option></select><button class="btn" id="start">Start 60s game</button><section class="leader"><h2>Top 5</h2><ol id="leaders"></ol></section></aside><section class="main"><div class="hud"><div><span>Player</span><strong id="player">-</strong></div><div><span>Score</span><strong id="score">0</strong></div><div><span>Time</span><strong id="time">60</strong></div><div><span>Streak</span><strong id="streak">0</strong></div></div><div class="card question"><div class="sum" id="q">Ready?</div><div class="answers" id="answers"></div><p id="feedback">Type a name to begin.</p></div></section></div></main><script src="../../results-config.js?v=1"></script><script src="../../results-client.js?v=1"></script><script>const STORE='tt-results';let data=JSON.parse(localStorage.getItem(STORE)||'{"best":{}}'),state={on:false,name:'',classLevel:'1st Class',score:0,streak:0,time:60,a:0,b:0,ans:0,correct:0,attempts:0},timer;const $=s=>document.querySelector(s);function save(){localStorage.setItem(STORE,JSON.stringify(data))}function leaders(){let rows=Object.entries(data.best).sort((a,b)=>b[1]-a[1]).slice(0,5);$('#leaders').innerHTML=rows.length?rows.map(([n,s])=>`<li>${n}: ${s}</li>`).join(''):'<li>No scores yet</li>'}function start(){let n=$('#name').value.trim();if(!n)return;clearInterval(timer);state={on:true,name:n,classLevel:$('#classLevel').value,score:0,streak:0,time:60,a:0,b:0,ans:0,correct:0,attempts:0};$('#player').textContent=n;tickHud();next();timer=setInterval(()=>{state.time--;tickHud();if(state.time<=0)finish()},1000)}function finish(){clearInterval(timer);state.on=false;$('#q').textContent='Done';$('#answers').innerHTML='';$('#feedback').textContent=`${state.name} scored ${state.score}`;data.best[state.name]=Math.max(data.best[state.name]||0,state.score);save();window.ClassroomResults?.record({game:'Times Tables',playerName:state.name,classLevel:state.classLevel,score:state.score,correct:state.correct,attempts:state.attempts,bestStreak:state.streak,durationSeconds:60});leaders()}function next(){state.a=rand(2,12);state.b=rand(2,12);state.ans=state.a*state.b;$('#q').textContent=`${state.a} x ${state.b}`;let set=new Set([state.ans]);while(set.size<4){let v=state.ans+[-12,-8,-4,-2,2,4,8,12][rand(0,7)];if(v>0)set.add(v)}$('#answers').innerHTML=[...set].sort(()=>Math.random()-.5).map(v=>`<button>${v}</button>`).join('')}function choose(v){if(!state.on)return;state.attempts++;if(+v===state.ans){state.correct++;state.streak++;state.score+=10+Math.min(20,state.streak*2);$('#feedback').textContent='Correct';$('#feedback').className='good'}else{state.streak=0;$('#feedback').textContent=`${state.a} x ${state.b} = ${state.ans}`;$('#feedback').className='miss'}tickHud();next()}function tickHud(){$('#score').textContent=state.score;$('#time').textContent=state.time;$('#streak').textContent=state.streak}function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}$('#start').onclick=start;$('#answers').onclick=e=>{if(e.target.tagName==='BUTTON')choose(e.target.textContent)};leaders();</script></body></html>
